name: NGO Grants Bot

on:
  workflow_dispatch:

  schedule:
  # Дві некруглі хвилини, розведені на протилежні половини години.
  # GitHub Actions найбільше навантажений рівно на :00 і :30 (і взагалі
  # на круглих 5/10-хвилинних позначках), тож обидва значення обрані
  # подалі від них — це не гарантує точний час, але знижує шанс,
  # що ОБИДВА запуски в одну годину потраплять у пікове навантаження.
  - cron: '23 * * * *'
  - cron: '53 * * * *'
jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bot.py

      - name: Commit posted_links
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Update posted_links
